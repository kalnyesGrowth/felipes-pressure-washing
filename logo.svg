<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="waterSpray" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E90FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00BFFF;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- House/Roof Icon -->
  <g transform="translate(10, 8)">
    <!-- Roof -->
    <polygon points="45,10 0,45 10,45 10,75 38,75 38,55 52,55 52,75 80,75 80,45 90,45" fill="url(#roofGrad)" stroke="none"/>
    <!-- Chimney -->
    <rect x="65" y="15" width="10" height="20" fill="#1565C0" rx="1"/>
    <!-- Door -->
    <rect x="38" y="55" width="14" height="20" fill="#0D47A1" rx="2"/>
    <!-- Window -->
    <rect x="15" y="50" width="16" height="14" fill="#64B5F6" rx="2" opacity="0.8"/>
    <line x1="23" y1="50" x2="23" y2="64" stroke="#0D47A1" stroke-width="1.5"/>
    <line x1="15" y1="57" x2="31" y2="57" stroke="#0D47A1" stroke-width="1.5"/>
  </g>

  <!-- Pressure Washer Wand -->
  <g transform="translate(75, 30)" filter="url(#glow)">
    <line x1="0" y1="45" x2="25" y2="15" stroke="#B0BEC5" stroke-width="4" stroke-linecap="round"/>
    <line x1="25" y1="15" x2="30" y2="8" stroke="#90A4AE" stroke-width="3" stroke-linecap="round"/>
    <!-- Nozzle tip -->
    <circle cx="31" cy="6" r="3" fill="#78909C"/>
    <!-- Water spray fan -->
    <path d="M34,4 Q55,-15 75,-8 Q60,-5 50,2 Q65,0 78,8 Q58,5 42,8 Z" fill="url(#waterSpray)" opacity="0.9"/>
    <!-- Water droplets -->
    <circle cx="65" cy="-5" r="2.5" fill="#1E90FF" opacity="0.8"/>
    <circle cx="72" cy="2" r="2" fill="#1E90FF" opacity="0.6"/>
    <circle cx="58" cy="-10" r="1.8" fill="#00BFFF" opacity="0.7"/>
    <circle cx="78" cy="5" r="1.5" fill="#00BFFF" opacity="0.5"/>
    <circle cx="55" cy="5" r="2" fill="#1E90FF" opacity="0.4"/>
  </g>

  <!-- Business Name Text -->
  <g transform="translate(120, 0)">
    <text x="0" y="42" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="34" fill="#FFFFFF" letter-spacing="1">FELIPE'S</text>
    <text x="0" y="72" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="26" fill="#1E90FF" letter-spacing="3">PRESSURE WASHING</text>
    <!-- Tagline -->
    <text x="0" y="95" font-family="Arial, sans-serif" font-weight="600" font-size="12" fill="#64B5F6" letter-spacing="5">CLEAN</text>
    <text x="72" y="95" font-family="Arial, sans-serif" font-weight="600" font-size="14" fill="#1E90FF">•</text>
    <text x="88" y="95" font-family="Arial, sans-serif" font-weight="600" font-size="12" fill="#64B5F6" letter-spacing="5">SHINE</text>
    <text x="153" y="95" font-family="Arial, sans-serif" font-weight="600" font-size="14" fill="#1E90FF">•</text>
    <text x="169" y="95" font-family="Arial, sans-serif" font-weight="600" font-size="12" fill="#64B5F6" letter-spacing="5">PROTECT</text>
  </g>
</svg>